name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag must use semantic version format vMAJOR.MINOR.PATCH: $tag" >&2
            exit 1
          fi

          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            echo "tag does not exist: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify tag is on main
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          git fetch origin main
          tag_commit="$(git rev-parse "$tag^{}")"
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "release tag must point to a commit reachable from origin/main: $tag" >&2
            exit 1
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.tag.outputs.tag }}" --generate-notes --verify-tag
