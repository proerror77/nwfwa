name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/ci/check_repo.sh

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fwa
          POSTGRES_PASSWORD: fwa
          POSTGRES_DB: fwa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fwa -d fwa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v6
      - run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/0001_initial.sql
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa
      - run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/0001_initial.sql
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml-service
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-console
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web-console/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
