name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/ci/check_repo.sh

  staging-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: python3 -m py_compile scripts/ops/validate_k8s_staging.py scripts/ops/validate_container_packaging.py scripts/ops/validate_analytics_scale.py scripts/ops/validate_ai_evidence_foundation.py scripts/ops/validate_operational_drill_proof.py scripts/ops/validate_staging_deployment_package.py scripts/ops/validate_production_deployment_package.py scripts/ops/validate_production_secret_file.py scripts/ops/validate_observability_manifests.py scripts/ops/validate_production_readiness_contract.py scripts/ops/build_staging_evidence.py scripts/ops/build_staging_deployment_package.py scripts/ops/build_production_deployment_package.py scripts/ops/build_production_readiness_contract.py scripts/ops/build_analytics_export.py scripts/ops/build_ai_evidence_foundation.py scripts/ops/build_prd_coverage.py scripts/ops/run_mlops_monitoring_plan.py
      - run: python3 scripts/ops/validate_k8s_staging.py
      - run: python3 scripts/ops/validate_container_packaging.py
      - run: python3 scripts/ops/validate_analytics_scale.py
      - run: python3 scripts/ops/validate_ai_evidence_foundation.py
      - run: python3 scripts/ops/validate_observability_manifests.py
      - run: python3 scripts/ops/build_staging_evidence.py --output-dir /tmp/nwfwa-staging-proof
      - run: python3 scripts/ops/validate_operational_drill_proof.py --proof-dir /tmp/nwfwa-staging-proof
      - run: python3 scripts/ops/build_staging_deployment_package.py --output-dir /tmp/nwfwa-staging-deployment --commit-sha "$GITHUB_SHA"
      - run: python3 scripts/ops/validate_staging_deployment_package.py --package-dir /tmp/nwfwa-staging-deployment
      - run: |
          python3 scripts/ops/build_production_deployment_package.py \
            --output-dir /tmp/nwfwa-production-deployment \
            --commit-sha "$GITHUB_SHA" \
            --api-image ghcr.io/nwfwa/api-server:ci \
            --web-console-image ghcr.io/nwfwa/web-console:ci \
            --ml-service-image ghcr.io/nwfwa/ml-service:ci \
            --worker-image ghcr.io/nwfwa/worker:ci \
            --ops-image ghcr.io/nwfwa/ops:ci \
            --mlops-alert-model-version ci-production \
            --mlops-scheduler-report-uri s3://nwfwa-production-artifacts/mlops/scheduler/ci_mlops_scheduler_execution_report.json \
            --host fwa.example.com
      - run: python3 scripts/ops/validate_production_deployment_package.py --package-dir /tmp/nwfwa-production-deployment
      - run: python3 scripts/ops/build_production_readiness_contract.py --output-dir /tmp/nwfwa-production-readiness
      - run: python3 scripts/ops/validate_production_readiness_contract.py --contract-dir /tmp/nwfwa-production-readiness
      - run: python3 scripts/ops/build_analytics_export.py --output-dir /tmp/nwfwa-analytics-export
      - run: python3 scripts/ops/build_ai_evidence_foundation.py --output-dir /tmp/nwfwa-ai-evidence-foundation
      - run: python3 scripts/ops/build_prd_coverage.py --output-dir /tmp/nwfwa-prd-coverage
      - run: |
          python3 scripts/ops/run_mlops_monitoring_plan.py \
            --plan scripts/ops/sample_mlops_monitoring_plan.json \
            --output-dir /tmp/nwfwa-mlops-monitoring
      - run: |
          test -f /tmp/nwfwa-staging-proof/object_storage_manifest.json
          test -f /tmp/nwfwa-staging-proof/backup_restore_proof.json
          test -f /tmp/nwfwa-staging-proof/retention_legal_hold_proof.json
          test -f /tmp/nwfwa-staging-proof/observability_proof.json
          test -f /tmp/nwfwa-staging-proof/operational_drill_proof.json
          test -f /tmp/nwfwa-staging-deployment/deployment_manifest.json
          test -f /tmp/nwfwa-staging-deployment/apply.sh
          test -f /tmp/nwfwa-staging-deployment/rollback.md
          test -f /tmp/nwfwa-production-deployment/deployment_manifest.json
          test -x /tmp/nwfwa-production-deployment/apply.sh
          test -x /tmp/nwfwa-production-deployment/tools/validate_production_secret_file.py
          test -f /tmp/nwfwa-production-readiness/production_readiness_contract.json
          test -f /tmp/nwfwa-production-readiness/index.json
          test -f /tmp/nwfwa-analytics-export/analytics_export_manifest.json
          test -f /tmp/nwfwa-analytics-export/scheduled_exports.json
          test -f /tmp/nwfwa-analytics-export/schema.sql
          test -f /tmp/nwfwa-analytics-export/dashboard_queries.sql
          test -f /tmp/nwfwa-ai-evidence-foundation/ai_evidence_foundation_manifest.json
          test -f /tmp/nwfwa-ai-evidence-foundation/index.json
          test -f /tmp/nwfwa-prd-coverage/prd_coverage_summary.json
          test -f /tmp/nwfwa-prd-coverage/index.json
          test -f /tmp/nwfwa-mlops-monitoring/shadow_report.json
          test -f /tmp/nwfwa-mlops-monitoring/drift_report.json
          test -f /tmp/nwfwa-mlops-monitoring/fairness_report.json
          test -f /tmp/nwfwa-mlops-monitoring/reviewer_disagreement_report.json
          test -f /tmp/nwfwa-mlops-monitoring/label_delay_report.json

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo fetch --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo test --locked --workspace
      - run: cargo run --locked -p worker -- health | python3 scripts/ci/assert_worker_health.py

  migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fwa
          POSTGRES_PASSWORD: fwa
          POSTGRES_DB: fwa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fwa -d fwa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v6
      - run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/0001_initial.sql
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa
      - run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/0001_initial.sql
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa

  demo-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fwa
          POSTGRES_PASSWORD: fwa
          POSTGRES_DB: fwa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fwa -d fwa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/ml-service/pyproject.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: scripts/demo/seed_demo.sh
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa
      - run: scripts/demo/seed_demo.sh
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa
      - run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF (SELECT COUNT(*) FROM claims WHERE external_claim_id IN ('CLM-0287', 'CLM-9100')) <> 2 THEN
              RAISE EXCEPTION 'demo claims missing';
            END IF;
            IF (SELECT COUNT(*) FROM knowledge_cases WHERE case_id IN ('KC-1001', 'KC-1002')) <> 2 THEN
              RAISE EXCEPTION 'demo knowledge cases missing';
            END IF;
            IF (SELECT COUNT(*) FROM model_evaluation_runs WHERE evaluation_run_id = 'eval-baseline-fwa-2026-05-demo') <> 1 THEN
              RAISE EXCEPTION 'demo model evaluation missing';
            END IF;
          END $$;
          SQL
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa
      - run: python -m pip install -e apps/ml-service
      - run: |
          python -m uvicorn app.main:app --app-dir apps/ml-service --host 127.0.0.1 --port 8001 >/tmp/fwa-ml-service.log 2>&1 &
          ml_pid=$!
          DATABASE_URL="$DATABASE_URL" \
          FWA_API_KEY=dev-secret \
          FWA_API_KEY_PRINCIPALS="dev-secret|demo-operator|fwa_operator|ops-studio|demo-customer|ops:*,tpa:*;rule-submit-secret|rule-submitter|fwa_operator|ops-studio|demo-customer|ops:rules:write,ops:rules:approve,ops:rules:publish,ops:rules:review;rule-approve-secret|rule-approver|fwa_operator|ops-studio|demo-customer|ops:rules:write,ops:rules:approve,ops:rules:publish,ops:rules:review" \
          FWA_MODEL_SERVICE_URL=http://127.0.0.1:8001 \
          cargo run --locked -p api-server >/tmp/fwa-api-server.log 2>&1 &
          api_pid=$!

          cleanup() {
            kill "$api_pid" >/dev/null 2>&1 || true
            kill "$ml_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          python - <<'PY'
          import time
          import urllib.request

          for _ in range(60):
              try:
                  with urllib.request.urlopen("http://127.0.0.1:8001/health", timeout=2) as response:
                      if response.status == 200:
                          raise SystemExit(0)
              except Exception:
                  time.sleep(1)
          raise SystemExit("ml-service did not become healthy")
          PY

          if ! FWA_DEMO_EXPECT_CONFIGURED_API_KEY=1 FWA_DEMO_RULE_SUBMIT_API_KEY=rule-submit-secret FWA_DEMO_RULE_APPROVE_API_KEY=rule-approve-secret scripts/demo/smoke_demo.py; then
            cat /tmp/fwa-ml-service.log
            cat /tmp/fwa-api-server.log
            exit 1
          fi

          if ! cargo run --locked -p worker -- run-retraining-job \
            --api-url "$FWA_API_BASE_URL" \
            --api-key "$FWA_API_KEY" \
            --actor trainer-worker-demo \
            --artifact-base-uri s3://fwa-demo/model-retraining \
            --model-key baseline_fwa; then
            cat /tmp/fwa-ml-service.log
            cat /tmp/fwa-api-server.log
            exit 1
          fi

          if ! FWA_DEMO_EXPECT_CONFIGURED_API_KEY=1 FWA_DEMO_RULE_SUBMIT_API_KEY=rule-submit-secret FWA_DEMO_RULE_APPROVE_API_KEY=rule-approve-secret scripts/demo/smoke_demo.py --govern-retraining-candidate; then
            cat /tmp/fwa-ml-service.log
            cat /tmp/fwa-api-server.log
            exit 1
          fi
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa
          FWA_API_BASE_URL: http://127.0.0.1:8080
          FWA_API_KEY: dev-secret
          FWA_SOURCE_SYSTEM: tpa-demo
      - run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/demo/assert_demo_persistence.sql
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa

  python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/ml-service
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/ml-service/pyproject.toml
      - run: python -m pip install -e ".[dev]"
      - run: pytest
      - run: |
          python ../../scripts/data/build_public_data_mvp.py \
            --synthetic-fixture \
            --output-dir /tmp/fwa-public-mvp \
            --dataset-version 2026-06-public-mvp
      - run: |
          python -m app.train \
            --manifest /tmp/fwa-public-mvp/manifest.json \
            --artifact-base-uri /tmp/fwa-public-mvp-artifacts \
            --model-key baseline_fwa \
            --base-model-version public-mvp \
            --job-id public_data_mvp_job_1 \
            --actor public-data-builder

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web-console
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/web-console
          cache-on-failure: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: cargo install trunk --version 0.21.14 --locked
      - run: cargo fmt -- --check
      - run: cargo check --locked --target wasm32-unknown-unknown
      - run: NO_COLOR=false trunk build --release --locked
      - run: node ../../scripts/demo/smoke_web_console.mjs
