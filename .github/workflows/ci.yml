name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/ci/check_repo.sh

  rust:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo fetch --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo test --locked --workspace

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fwa
          POSTGRES_PASSWORD: fwa
          POSTGRES_DB: fwa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fwa -d fwa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v6
      - run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/0001_initial.sql
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa
      - run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/0001_initial.sql
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa

  demo-seed:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fwa
          POSTGRES_PASSWORD: fwa
          POSTGRES_DB: fwa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fwa -d fwa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v6
      - run: scripts/demo/seed_demo.sh
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa
      - run: scripts/demo/seed_demo.sh
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa
      - run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF (SELECT COUNT(*) FROM claims WHERE external_claim_id IN ('CLM-0287', 'CLM-9100')) <> 2 THEN
              RAISE EXCEPTION 'demo claims missing';
            END IF;
            IF (SELECT COUNT(*) FROM knowledge_cases WHERE case_id IN ('KC-1001', 'KC-1002')) <> 2 THEN
              RAISE EXCEPTION 'demo knowledge cases missing';
            END IF;
            IF (SELECT COUNT(*) FROM model_evaluation_runs WHERE evaluation_run_id = 'eval-baseline-fwa-2026-05-demo') <> 1 THEN
              RAISE EXCEPTION 'demo model evaluation missing';
            END IF;
          END $$;
          SQL
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml-service
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-console
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web-console/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
