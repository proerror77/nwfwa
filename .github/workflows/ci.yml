name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/ci/check_repo.sh

  rust:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo fetch --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo test --locked --workspace
      - run: cargo run --locked -p worker -- health | python3 scripts/ci/assert_worker_health.py

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fwa
          POSTGRES_PASSWORD: fwa
          POSTGRES_DB: fwa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fwa -d fwa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v6
      - run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/0001_initial.sql
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa
      - run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/0001_initial.sql
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa

  demo-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fwa
          POSTGRES_PASSWORD: fwa
          POSTGRES_DB: fwa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fwa -d fwa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: scripts/demo/seed_demo.sh
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa
      - run: scripts/demo/seed_demo.sh
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa
      - run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF (SELECT COUNT(*) FROM claims WHERE external_claim_id IN ('CLM-0287', 'CLM-9100')) <> 2 THEN
              RAISE EXCEPTION 'demo claims missing';
            END IF;
            IF (SELECT COUNT(*) FROM knowledge_cases WHERE case_id IN ('KC-1001', 'KC-1002')) <> 2 THEN
              RAISE EXCEPTION 'demo knowledge cases missing';
            END IF;
            IF (SELECT COUNT(*) FROM model_evaluation_runs WHERE evaluation_run_id = 'eval-baseline-fwa-2026-05-demo') <> 1 THEN
              RAISE EXCEPTION 'demo model evaluation missing';
            END IF;
          END $$;
          SQL
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa
      - run: python -m pip install -e apps/ml-service
      - run: |
          python -m uvicorn app.main:app --app-dir apps/ml-service --host 127.0.0.1 --port 8001 >/tmp/fwa-ml-service.log 2>&1 &
          ml_pid=$!
          DATABASE_URL="$DATABASE_URL" \
          FWA_API_KEY=dev-secret \
          FWA_MODEL_SERVICE_URL=http://127.0.0.1:8001 \
          cargo run --locked -p api-server >/tmp/fwa-api-server.log 2>&1 &
          api_pid=$!

          cleanup() {
            kill "$api_pid" >/dev/null 2>&1 || true
            kill "$ml_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          python - <<'PY'
          import time
          import urllib.request

          for _ in range(60):
              try:
                  with urllib.request.urlopen("http://127.0.0.1:8001/health", timeout=2) as response:
                      if response.status == 200:
                          raise SystemExit(0)
              except Exception:
                  time.sleep(1)
          raise SystemExit("ml-service did not become healthy")
          PY

          if ! scripts/demo/smoke_demo.py; then
            cat /tmp/fwa-ml-service.log
            cat /tmp/fwa-api-server.log
            exit 1
          fi

          if ! cargo run --locked -p worker -- run-retraining-job \
            --api-url "$FWA_API_BASE_URL" \
            --api-key "$FWA_API_KEY" \
            --actor trainer-worker-demo \
            --artifact-base-uri s3://fwa-demo/model-retraining \
            --model-key baseline_fwa; then
            cat /tmp/fwa-ml-service.log
            cat /tmp/fwa-api-server.log
            exit 1
          fi

          if ! scripts/demo/smoke_demo.py --govern-retraining-candidate; then
            cat /tmp/fwa-ml-service.log
            cat /tmp/fwa-api-server.log
            exit 1
          fi
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa
          FWA_API_BASE_URL: http://127.0.0.1:8080
          FWA_API_KEY: dev-secret
          FWA_SOURCE_SYSTEM: tpa-demo
      - run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/demo/assert_demo_persistence.sql
        env:
          DATABASE_URL: postgres://fwa:fwa@localhost:5432/fwa

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml-service
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-console
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/web-console
          cache-on-failure: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web-console/package-lock.json
      - run: cargo install trunk --version 0.21.14 --locked
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run smoke:build
