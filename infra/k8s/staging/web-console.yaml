apiVersion: v1
kind: Service
metadata:
  name: web-console
  labels:
    app.kubernetes.io/name: web-console
    app.kubernetes.io/part-of: nwfwa-staging
spec:
  selector:
    app.kubernetes.io/name: web-console
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-console
  labels:
    app.kubernetes.io/name: web-console
    app.kubernetes.io/part-of: nwfwa-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-console
        app.kubernetes.io/part-of: nwfwa-staging
    spec:
      containers:
        - name: web-console
          image: ghcr.io/replace-me/nwfwa-web-console:staging
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8081
            periodSeconds: 15
