apiVersion: v1
kind: Service
metadata:
  name: ml-service
  labels:
    app.kubernetes.io/name: ml-service
    app.kubernetes.io/part-of: nwfwa-staging
spec:
  selector:
    app.kubernetes.io/name: ml-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  labels:
    app.kubernetes.io/name: ml-service
    app.kubernetes.io/part-of: nwfwa-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ml-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ml-service
        app.kubernetes.io/part-of: nwfwa-staging
    spec:
      containers:
        - name: ml-service
          image: ghcr.io/replace-me/nwfwa-ml-service:staging
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: nwfwa-staging-config
          ports:
            - name: http
              containerPort: 8001
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
          volumeMounts:
            - name: ml-training-jobs
              mountPath: /app/data/ml-service
        - name: ml-training-worker
          image: ghcr.io/replace-me/nwfwa-ml-service:staging
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: nwfwa-staging-config
          command:
            - python
            - -m
            - app.training_worker
            - --db
            - /app/data/ml-service/training_jobs.sqlite3
            - --worker-id
            - staging-ml-training-worker
            - --lease-seconds
            - "900"
          volumeMounts:
            - name: ml-training-jobs
              mountPath: /app/data/ml-service
      volumes:
        - name: ml-training-jobs
          persistentVolumeClaim:
            claimName: ml-training-jobs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-training-jobs
  labels:
    app.kubernetes.io/name: ml-service
    app.kubernetes.io/part-of: nwfwa-staging
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
