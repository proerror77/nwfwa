apiVersion: v1
kind: Service
metadata:
  name: api-server
  labels:
    app.kubernetes.io/name: api-server
    app.kubernetes.io/part-of: nwfwa-staging
spec:
  selector:
    app.kubernetes.io/name: api-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  labels:
    app.kubernetes.io/name: api-server
    app.kubernetes.io/part-of: nwfwa-staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-server
        app.kubernetes.io/part-of: nwfwa-staging
    spec:
      containers:
        - name: api-server
          image: ghcr.io/replace-me/nwfwa-api-server:staging
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: nwfwa-staging-config
            - secretRef:
                name: nwfwa-staging-secrets
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 3
