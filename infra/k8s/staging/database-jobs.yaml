apiVersion: batch/v1
kind: Job
metadata:
  name: database-migrate
  labels:
    app.kubernetes.io/name: database-migrate
    app.kubernetes.io/part-of: nwfwa-staging
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: database-migrate
        app.kubernetes.io/part-of: nwfwa-staging
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/replace-me/nwfwa-ops:staging
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nwfwa-staging-secrets
                  key: DATABASE_URL
          command:
            - /bin/sh
            - -c
          args:
            - psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /app/migrations/0001_initial.sql
---
