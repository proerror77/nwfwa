apiVersion: v1
kind: Secret
metadata:
  name: nwfwa-staging-secrets
  labels:
    app.kubernetes.io/name: nwfwa
    environment: staging
type: Opaque
stringData:
  FWA_API_KEY: replace-with-staging-api-key
  FWA_API_KEY_PRINCIPALS: replace-with-key|staging-tpa-system|tpa_system|staging-tpa|staging-customer|tpa:*
  FWA_MODEL_SIGNATURE_KEY: replace-with-model-signing-key
  FWA_ALERT_RECEIVER_TOKEN: replace-with-alert-receiver-token
  FWA_ALERT_RECEIVER_SIGNING_SECRET: replace-with-alert-receiver-signing-secret
  FWA_MLOPS_ALERT_ROUTER_TOKEN: replace-with-mlops-alert-router-token
  DATABASE_URL: postgres://fwa:replace-with-postgres-password@postgres:5432/fwa
  POSTGRES_USER: fwa
  POSTGRES_PASSWORD: replace-with-postgres-password
  POSTGRES_DB: fwa
  MINIO_ROOT_USER: replace-with-minio-user
  MINIO_ROOT_PASSWORD: replace-with-minio-password
