apiVersion: v1
kind: Service
metadata:
  name: object-storage
  labels:
    app.kubernetes.io/name: object-storage
    app.kubernetes.io/part-of: nwfwa-staging
spec:
  selector:
    app.kubernetes.io/name: object-storage
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: object-storage
  labels:
    app.kubernetes.io/name: object-storage
    app.kubernetes.io/part-of: nwfwa-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: object-storage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: object-storage
        app.kubernetes.io/part-of: nwfwa-staging
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: nwfwa-staging-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nwfwa-staging-secrets
                  key: MINIO_ROOT_PASSWORD
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            periodSeconds: 10
          volumeMounts:
            - name: object-storage-data
              mountPath: /data
      volumes:
        - name: object-storage-data
          persistentVolumeClaim:
            claimName: object-storage-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: object-storage-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 50Gi
