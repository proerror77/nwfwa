apiVersion: batch/v1
kind: CronJob
metadata:
  name: mlops-monitoring-runtime
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: nwfwa-staging
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 900
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 7
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: worker
            app.kubernetes.io/part-of: nwfwa-staging
        spec:
          serviceAccountName: nwfwa-worker
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          containers:
            - name: worker
              image: ghcr.io/replace-me/nwfwa-worker:staging
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: nwfwa-staging-config
                - secretRef:
                    name: nwfwa-staging-secrets
              command:
                - worker
                - run-scheduled-mlops-monitoring
                - --manifest-uri
                - s3://nwfwa-staging-artifacts/datasets/public-mvp/manifest.json
                - --artifact-uri
                - s3://nwfwa-staging-artifacts/models/baseline_fwa/staging/rust_serving_artifact.json
                - --model-key
                - baseline_fwa
                - --model-version
                - staging
                - --cron
                - "0 2 * * *"
                - --output-dir
                - /tmp/nwfwa-mlops-monitoring
                - --artifact-base-uri
                - s3://nwfwa-staging-artifacts/mlops-monitoring/baseline_fwa/staging
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
