apiVersion: batch/v1
kind: CronJob
metadata:
  name: governance-ops-plan
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: nwfwa-staging
spec:
  schedule: "45 1 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 900
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 7
  jobTemplate:
    spec:
      activeDeadlineSeconds: 900
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: worker
            app.kubernetes.io/part-of: nwfwa-staging
        spec:
          serviceAccountName: nwfwa-worker
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          containers:
            - name: worker
              image: ghcr.io/replace-me/nwfwa-worker:staging
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: nwfwa-staging-config
                - secretRef:
                    name: nwfwa-staging-secrets
              command:
                - worker
                - build-governance-ops-plan
                - --object-storage-uri
                - s3://nwfwa-staging-artifacts
                - --database-ref
                - postgres://postgres:5432/fwa
                - --customer-scope-id
                - staging-customer
                - --retention-policy-id
                - staging-retention-v1
                - --backup-restore-plan-id
                - staging-backup-restore-v1
                - --legal-hold-policy-id
                - staging-legal-hold-v1
                - --cron
                - "45 1 * * *"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
---
