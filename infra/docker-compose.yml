services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fwa
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fwa"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - fwa_postgres_data:/var/lib/postgresql/data

  ml-service:
    build:
      context: ../apps/ml-service
    ports:
      - "8001:8001"

  migrate-seed:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/fwa
    volumes:
      - ../migrations:/app/migrations:ro
      - ../scripts/demo:/app/scripts/demo:ro
    command:
      - sh
      - -c
      - |
        psql "$$DATABASE_URL" -v ON_ERROR_STOP=1 \
          -f /app/migrations/0001_initial.sql \
          -f /app/scripts/demo/seed_demo.sql

  api-server:
    build:
      context: ..
      dockerfile: apps/api-server/Dockerfile
    depends_on:
      migrate-seed:
        condition: service_completed_successfully
      ml-service:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/fwa
      FWA_API_KEY: dev-secret
      FWA_BIND_ADDR: 0.0.0.0:8080
      FWA_MODEL_SERVICE_URL: http://ml-service:8001
    ports:
      - "8080:8080"

  web-console:
    build:
      context: ..
      dockerfile: apps/web-console/Dockerfile
    depends_on:
      api-server:
        condition: service_started
    ports:
      - "5173:8081"

  object-storage:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - fwa_object_storage_data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: fwa_analytics
    ports:
      - "8123:8123"
      - "9002:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - fwa_clickhouse_data:/var/lib/clickhouse
      - ../analytics/clickhouse/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

volumes:
  fwa_postgres_data:
  fwa_object_storage_data:
  fwa_clickhouse_data:
