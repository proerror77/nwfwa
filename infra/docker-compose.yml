services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fwa
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fwa"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - fwa_postgres_data:/var/lib/postgresql/data

  ml-service:
    build:
      context: ../apps/ml-service
    ports:
      - "8001:8001"

  object-storage:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - fwa_object_storage_data:/data

volumes:
  fwa_postgres_data:
  fwa_object_storage_data:
